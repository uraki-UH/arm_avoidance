gng_safety:
  ros__parameters:
    # Experiment Settings
    experiment_id: "topoarm_full_v2"
    data_directory: "gng_results"

    # Robot Settings
    robot_urdf_path: "temp_robot.urdf"
    ground_z_threshold: 0.0
    leaf_link_name: "end_effector_link"
    gng_dimension: 6

    # Voxel Resolution Settings
    spatial_map_resolution: 0.02
    sensing_resolution: 0.02
    arm_cache_resolution: 0.008

    # Safety Settings
    danger_threshold: 0.025

    # GNG Offline Training Parameters
    gng_params:
      lambda: 50
      max_node_num: 10000
      num_samples: 1000000
      max_iterations: 1000000
      refine_iterations: 100000
      coord_edge_iterations: 200000

      # Learning Rates
      learn_rate_s1: 0.08
      learn_rate_s2: 0.008

      # Topology
      max_edge_age: 500
      alpha: 0.5
      beta: 0.0005

      # Optimization (for offline/AiS)
      n_best_candidates: 4
      ais_threshold: 1.0

      # Initialization
      start_node_num: 2
