<!DOCTYPE html>
<html>

<head>
    <title>Universal Robot Collision Inspector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.7/dat.gui.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }

        #loader {
            position: absolute;
            top: 80px;
            left: 20px;
            z-index: 20;
            background: rgba(0, 255, 200, 0.1);
            border: 1px solid #00ffcc;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
        }

        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <h1 style="margin:0; font-size: 1.5em; letter-spacing: 2px;">UNIVERSAL COLLISION INSPECTOR</h1>
        <p style="margin:5px 0; color: #777;">[ MESH + CAPSULE + VOXEL ]</p>
    </div>
    <div id="loader">
        <p style="margin-top:0; font-size: 0.9em;">Load <code>robot_model.json</code>:</p>
        <input type="file" id="fileInput" accept=".json">
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 20);
        camera.up.set(0, 0, 1);
        camera.position.set(0.6, -0.6, 0.6);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        scene.add(new THREE.GridHelper(2, 20, 0x444444, 0x222222).rotateX(Math.PI / 2));
        scene.add(new THREE.AmbientLight(0x888888));
        const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(1, -1, 1); scene.add(light);

        const config = { voxelSize: 0.01, showMesh: true, showVoxels: true, showCapsules: true, showAABB: true, opacity: 0.3 };
        let gui = null;
        let robotData = null;
        let linkGroups = {};
        let jointNodes = {};
        let realMeshes = [];
        let capsuleGroups = {};
        let linkVoxelMeshes = {}; // { linkName: InstancedMesh }
        let aabbHelpers = {};     // { linkName: BoxHelper }

        document.getElementById('fileInput').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = e => {
                robotData = JSON.parse(e.target.result);
                buildRobot();
                document.getElementById('loader').style.display = 'none';
            };
            reader.readAsText(e.target.files[0]);
        });

        function buildRobot() {
            // Clean existing scene
            Object.values(linkGroups).forEach(g => { if (g.parent) g.parent.remove(g); });
            Object.values(aabbHelpers).forEach(h => scene.remove(h));
            linkGroups = {}; jointNodes = {}; realMeshes = []; capsuleGroups = {}; linkVoxelMeshes = {}; aabbHelpers = {};

            // Re-init GUI
            if (gui) gui.destroy();
            gui = new dat.GUI();
            const f1 = gui.addFolder('Visibility');
            const f2 = gui.addFolder('Robot Control');
            const f3 = gui.addFolder('Capsule Tuning');

            Object.keys(robotData.links).forEach(name => { linkGroups[name] = new THREE.Group(); });

            robotData.joints.forEach(j => {
                const jGroup = new THREE.Group();
                jGroup.position.set(j.xyz[0], j.xyz[1], j.xyz[2]);
                jGroup.rotation.set(j.rpy[0], j.rpy[1], j.rpy[2]);
                linkGroups[j.parent].add(jGroup);
                jGroup.add(linkGroups[j.child]);
                jointNodes[j.name] = { group: jGroup, axis: new THREE.Vector3(...j.axis), type: j.type, originXYZ: [...j.xyz] };

                config[j.name] = 0;
                if (j.type === 'revolute' || j.type === 'continuous') {
                    f2.add(config, j.name, -3.14, 3.14).onChange(v => {
                        jGroup.setRotationFromAxisAngle(jointNodes[j.name].axis, v);
                    });
                } else if (j.type === 'prismatic') {
                    f2.add(config, j.name, -0.05, 0.05).onChange(v => {
                        const axis = jointNodes[j.name].axis.clone().multiplyScalar(v);
                        jGroup.position.set(j.xyz[0] + axis.x, j.xyz[1] + axis.y, j.xyz[2] + axis.z);
                    });
                }
            });
            scene.add(linkGroups[Object.keys(linkGroups)[0]]);

            Object.keys(robotData.links).forEach(name => {
                const link = robotData.links[name];
                const visualOnlyGroup = new THREE.Group(); // Only for AABB/Visuals
                linkGroups[name].add(visualOnlyGroup);

                link.meshes.forEach(m => {
                    const geometry = new THREE.BufferGeometry();
                    const vFlat = []; m.vertices.forEach(tri => tri.forEach(v => vFlat.push(...v)));
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vFlat, 3));
                    geometry.computeVertexNormals();
                    const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: 0x00ffcc, transparent: true, opacity: config.opacity }));
                    mesh.position.set(...m.origin.xyz);
                    mesh.rotation.set(...m.origin.rpy);
                    visualOnlyGroup.add(mesh);
                    realMeshes.push(mesh);
                });

                // Generate Local Voxels (internally adds to linkGroups[name])
                generateLinkVoxels(name, visualOnlyGroup);

                if (link.capsule) {
                    const c = link.capsule;
                    const capGroup = new THREE.Group();
                    const mat = new THREE.MeshPhongMaterial({ color: 0xff00ff, transparent: true, opacity: 0.3 });
                    const updateCap = () => {
                        capGroup.clear();
                        const cyl = new THREE.Mesh(new THREE.CylinderGeometry(c.r, c.r, c.h, 16), mat);
                        const s1 = new THREE.Mesh(new THREE.SphereGeometry(c.r, 16, 16), mat);
                        const s2 = new THREE.Mesh(new THREE.SphereGeometry(c.r, 16, 16), mat);
                        s1.position.y = c.h / 2; s2.position.y = -c.h / 2;
                        capGroup.add(cyl, s1, s2);
                        if (c.axis === 0) capGroup.rotation.z = Math.PI / 2;
                        else if (c.axis === 2) capGroup.rotation.x = Math.PI / 2;
                        if (c.axis === 0) capGroup.position.x = c.oz;
                        else if (c.axis === 1) capGroup.position.y = c.oz;
                        else if (c.axis === 2) capGroup.position.z = c.oz;
                        capGroup.visible = config.showCapsules;
                    };
                    updateCap();
                    visualOnlyGroup.add(capGroup);
                    capsuleGroups[name] = { group: capGroup, update: updateCap, data: c };
                    const f = f3.addFolder(name);
                    f.add(c, 'r', 0, 0.1).name('Radius').onChange(updateCap);
                    f.add(c, 'h', 0, 0.4).name('Height').onChange(updateCap);
                    f.add(c, 'oz', -0.3, 0.3).name('Offset').onChange(updateCap);
                }

                // AABB Helper (Targets only the visuals of THIS link)
                const helper = new THREE.BoxHelper(visualOnlyGroup, 0xffff00);
                helper.visible = config.showAABB;
                scene.add(helper);
                aabbHelpers[name] = helper;
            });

            f1.add(config, 'showMesh').name('STL Mesh').onChange(v => { realMeshes.forEach(m => m.visible = v); });
            f1.add(config, 'showVoxels').name('Show Voxels').onChange(v => Object.values(linkVoxelMeshes).forEach(m => m.visible = v));
            f1.add(config, 'showCapsules').name('Show Capsules').onChange(v => Object.values(capsuleGroups).forEach(g => g.group.visible = v));
            f1.add(config, 'showAABB').name('Show AABB').onChange(v => Object.values(aabbHelpers).forEach(h => h.visible = v));
            f1.add(config, 'opacity', 0, 1).onChange(v => realMeshes.forEach(m => m.material.opacity = v));
            f1.add(config, 'voxelSize', 0.005, 0.05).name('Voxel Size').onFinishChange(() => {
                Object.keys(robotData.links).forEach(name => generateLinkVoxels(name));
            });
            f1.open(); f2.open();
        }

        function generateLinkVoxels(linkName, targetGroup) {
            const parent = targetGroup || linkGroups[linkName];
            // Remove old voxel mesh for this link
            if (linkVoxelMeshes[linkName]) {
                parent.remove(linkVoxelMeshes[linkName]);
                linkVoxelMeshes[linkName].geometry.dispose();
                linkVoxelMeshes[linkName].material.dispose();
            }

            const link = robotData.links[linkName];
            if (!link.meshes || link.meshes.length === 0) return;

            const vSize = config.voxelSize;
            const uniqueVoxels = new Set();
            const voxelPositions = [];

            link.meshes.forEach(m => {
                const localPos = new THREE.Vector3(...m.origin.xyz);
                const localQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(...m.origin.rpy));

                for (let i = 0; i < m.vertices.length; i++) {
                    const tri = m.vertices[i];
                    const v1 = new THREE.Vector3(...tri[0]).applyQuaternion(localQuat).add(localPos);
                    const v2 = new THREE.Vector3(...tri[1]).applyQuaternion(localQuat).add(localPos);
                    const v3 = new THREE.Vector3(...tri[2]).applyQuaternion(localQuat).add(localPos);

                    const d12 = v1.distanceTo(v2), d13 = v1.distanceTo(v3);
                    const steps1 = Math.max(1, Math.ceil(d12 / vSize)), steps2 = Math.max(1, Math.ceil(d13 / vSize));

                    for (let s1 = 0; s1 <= steps1; s1++) {
                        const t1 = s1 / steps1;
                        for (let s2 = 0; s2 <= steps2 * (1 - t1); s2++) {
                            const t2 = s2 / steps2;
                            const px = v1.x + t1 * (v2.x - v1.x) + t2 * (v3.x - v1.x);
                            const py = v1.y + t1 * (v2.y - v1.y) + t2 * (v3.y - v1.y);
                            const pz = v1.z + t1 * (v2.z - v1.z) + t2 * (v3.z - v1.z);
                            const vx = Math.floor(px / vSize), vy = Math.floor(py / vSize), vz = Math.floor(pz / vSize);
                            const vid = `${vx},${vy},${vz}`;
                            if (!uniqueVoxels.has(vid)) {
                                uniqueVoxels.add(vid);
                                voxelPositions.push(vx * vSize + vSize / 2, vy * vSize + vSize / 2, vz * vSize + vSize / 2);
                            }
                        }
                    }
                }
            });

            if (voxelPositions.length > 0) {
                const boxGeom = new THREE.BoxGeometry(vSize * 0.95, vSize * 0.95, vSize * 0.95);
                const voxelMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, transparent: true, opacity: 0.4, wireframe: true });
                const instMesh = new THREE.InstancedMesh(boxGeom, voxelMat, voxelPositions.length / 3);
                const dummy = new THREE.Object3D();
                for (let i = 0; i < voxelPositions.length; i += 3) {
                    dummy.position.set(voxelPositions[i], voxelPositions[i + 1], voxelPositions[i + 2]);
                    dummy.updateMatrix();
                    instMesh.setMatrixAt(i / 3, dummy.matrix);
                }
                instMesh.visible = config.showVoxels;
                linkGroups[linkName].add(instMesh);
                linkVoxelMeshes[linkName] = instMesh;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            Object.values(aabbHelpers).forEach(h => h.update());
            controls.update(); renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>

</html>
